# ============================================================
#  AI-Powered Document Audit System — Spring Boot Config
# ============================================================

# Server
server.port=8080
server.servlet.context-path=/

# DataSource — PostgreSQL (same DB as Node.js backend)
spring.datasource.url=jdbc:postgresql://localhost:5432/AIDOCUMENT_DB
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=your_super_secret_jwt_key_change_this_in_production_12345_extended_for_hs256
jwt.expiration=604800000

# File Upload (50MB max)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=./uploads

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
info.app.name=AI Document Audit System
info.app.version=1.0.0
info.app.description=SIFCO AE - AI-Powered Document Audit and Management

# Logging
logging.level.com.sifco.auditdoc=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS (handled by CorsConfig.java, this disables default restrictive CORS)
spring.mvc.cors.allowed-origins=*
